<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler - iotolye</title>
    <meta name="description" content="IoT projeleri: ESP32, Arduino, Raspberry Pi ve daha fazlası.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">
                <img src="assets/logo.svg" alt="iotolye logo" class="logo-svg">
                <span>iot<span class="logo-accent">olye</span></span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/#hakkimizda">Hakkımızda</a></li>
                <li><a href="/projeler" class="active-link">Projeler</a></li>
                <li><a href="/videolar">Videolar</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/#iletisim">İletişim</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Menüyü aç">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-hero">
        <div class="container">
            <span class="section-tag">Projeler</span>
            <h1>IoT Projeleri</h1>
            <p class="section-desc">ESP32, Arduino, Raspberry Pi ve daha fazlasıyla geliştirdiğimiz projeler.</p>
        </div>
    </section>

    <!-- Filter -->
    <section class="section" style="padding-top:0">
        <div class="container">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">Tümü</button>
                <button class="filter-btn" data-filter="ESP32">ESP32</button>
                <button class="filter-btn" data-filter="Arduino">Arduino</button>
                <button class="filter-btn" data-filter="Raspberry Pi">Raspberry Pi</button>
            </div>
            <div class="projects-grid" id="projectsGrid">
                <div class="empty-state">
                    <p>Henüz proje eklenmedi. Yakında burada olacak!</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 iotolye.com - Tüm hakları saklıdır.</p>
            </div>
        </div>
    </footer>

    <script>
    // Mobile menu
    document.getElementById('navToggle').addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('active');
    });

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    const difficultyMap = {
        beginner: { label: 'Başlangıç', class: 'beginner' },
        intermediate: { label: 'Orta', class: 'intermediate' },
        advanced: { label: 'İleri', class: 'advanced' }
    };

    let allProjects = [];

    async function loadProjects() {
        try {
            const res = await fetch('/api/projects/published');
            allProjects = await res.json();
            renderProjects(allProjects);
        } catch (e) {}
    }

    function renderProjects(projects) {
        const grid = document.getElementById('projectsGrid');
        if (projects.length === 0) {
            grid.innerHTML = '<div class="empty-state"><p>Bu kategoride proje bulunamadı.</p></div>';
            return;
        }
        grid.innerHTML = projects.map(p => {
            const diff = difficultyMap[p.difficulty] || difficultyMap.beginner;
            const imageHtml = p.image
                ? `<img src="${escapeHtml(p.image)}" alt="${escapeHtml(p.title)}" style="width:100%;height:100%;object-fit:cover">`
                : `<div class="project-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>`;
            const linkAttr = p.link ? `onclick="window.open('${escapeHtml(p.link)}','_blank')" style="cursor:pointer"` : '';
            return `
            <article class="project-card" ${linkAttr}>
                <div class="project-image">
                    ${imageHtml}
                    <span class="project-tag">${escapeHtml(p.tag)}</span>
                </div>
                <div class="project-content">
                    <h3>${escapeHtml(p.title)}</h3>
                    <p>${escapeHtml(p.description)}</p>
                    <div class="project-meta">
                        <span class="difficulty ${diff.class}">${diff.label}</span>
                        <span class="project-date">${new Date(p.created_at).toLocaleDateString('tr-TR')}</span>
                    </div>
                </div>
            </article>`;
        }).join('');
    }

    // Filter
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.dataset.filter;
            if (filter === 'all') {
                renderProjects(allProjects);
            } else {
                renderProjects(allProjects.filter(p => p.tag === filter));
            }
        });
    });

    loadProjects();
    </script>
</body>
</html>
